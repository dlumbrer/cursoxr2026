<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="azulejo" src="textura_suelo.jpeg">
        <img id="fondo" src="fondo.jpg">
      </a-assets>

      <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9" height="1" width="1" depth="1"></a-box>

      <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>

      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>

      <a-cone position="0 4 -3" color="red"></a-cone>


      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4" src="#azulejo"></a-plane>
      
      <a-cone position="0 2.04 -3" color="yellow" opacity="0.5"></a-cone>

      <a-sky src="#fondo"></a-sky>
    </a-scene>
  </body>
</html>
